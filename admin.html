<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - SUBZERO STORE PREMIUM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">
    <!-- Login -->
    <div id="login-section" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card bg-dark text-light">
                    <div class="card-body">
                        <h2 class="text-center">Login Admin</h2>
                        <form id="admin-login-form">
                            <div class="mb-3">
                                <label for="admin-password" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="admin-password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Entrar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Painel Admin -->
    <div id="admin-panel" class="container d-none">
        <h1>Painel Administrativo</h1>
        <div class="row">
            <div class="col-md-3">
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link text-light" href="#dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="#usuarios">Usuários</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="#catalogo">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="#recargas">Recargas</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="#ranking">Ranking</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="#notificacoes">Notificações</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="#configuracoes">Configurações</a></li>
                </ul>
            </div>
            <div class="col-md-9">
                <!-- Dashboard -->
                <section id="dashboard">
                    <h2>Dashboard</h2>
                    <div class="row">
                        <div class="col-md-4"><div class="card bg-dark text-light"><div class="card-body"><h5>Total de Usuários</h5><p id="total-usuarios">0</p></div></div></div>
                        <div class="col-md-4"><div class="card bg-dark text-light"><div class="card-body"><h5>Receita Total</h5><p>R$<span id="receita-total">0,00</span></p></div></div></div>
                        <div class="col-md-4"><div class="card bg-dark text-light"><div class="card-body"><h5>Vendas Hoje</h5><p id="vendas-hoje">0</p></div></div></div>
                    </div>
                </section>

                <!-- Usuários -->
                <section id="usuarios" class="mt-5">
                    <h2>Gerenciar Usuários</h2>
                    <form id="usuario-form">
                        <div class="mb-3">
                            <label for="user-id" class="form-label">ID do Usuário</label>
                            <input type="text" class="form-control" id="user-id">
                        </div>
                        <div class="mb-3">
                            <label for="user-saldo" class="form-label">Saldo</label>
                            <input type="number" class="form-control" id="user-saldo" step="0.01">
                        </div>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </form>
                </section>

                <!-- Catálogo -->
                <section id="catalogo" class="mt-5">
                    <h2>Gerenciar Catálogo</h2>
                    <form id="produto-form">
                        <div class="mb-3">
                            <label for="produto-nome" class="form-label">Nome do Produto</label>
                            <input type="text" class="form-control" id="produto-nome" required>
                        </div>
                        <div class="mb-3">
                            <label for="produto-preco" class="form-label">Preço (R$)</label>
                            <input type="number" class="form-control" id="produto-preco" step="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label for="produto-descricao" class="form-label">Descrição</label>
                            <textarea class="form-control" id="produto-descricao"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="produto-estoque" class="form-label">Estoque</label>
                            <input type="number" class="form-control" id="produto-estoque" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Adicionar Produto</button>
                    </form>
                </section>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
